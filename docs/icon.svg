<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1438"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5cf6ff"/>
      <stop offset="100%" stop-color="#c8a6ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- reticle ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#stroke)" stroke-width="8" opacity="0.85" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#5cf6ff" stroke-width="2" opacity="0.9"/>

  <!-- crosshair -->
  <line x1="256" y1="80"  x2="256" y2="170" stroke="#5cf6ff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="256" y1="342" x2="256" y2="432" stroke="#5cf6ff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="80"  y1="256" x2="170" y2="256" stroke="#5cf6ff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="342" y1="256" x2="432" y2="256" stroke="#5cf6ff" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>

  <!-- center dot -->
  <circle cx="256" cy="256" r="10" fill="#ff3040" filter="url(#glow)"/>

  <!-- paint splat accent, bottom-right -->
  <g transform="translate(360,360)" opacity="0.9">
    <circle cx="0" cy="0" r="22" fill="#c8a6ff" filter="url(#glow)"/>
    <circle cx="-24" cy="10" r="9" fill="#c8a6ff"/>
    <circle cx="18" cy="-18" r="7" fill="#c8a6ff"/>
  </g>
</svg>
