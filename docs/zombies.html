<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"/>
<title>GhostPaint · Zombies</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0a0612"/>
<style>
  :root {
    --cyan: #5cf6ff; --amethyst: #c8a6ff; --blood: #ff3040;
    --gold: #ffd166; --green: #69f0ae; --rot: #6dff7e;
    --bg-0: #0a0612; --ink: #e9e3ff; --ink-dim: #8b86b3;
    --glow: 0 0 12px rgba(92,246,255,0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #000; color: var(--ink);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none; }

  .world-gradient {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(circle at 50% 80%, rgba(109,255,126,0.06), transparent 50%),
      radial-gradient(circle at 30% 30%, rgba(255,48,64,0.08), transparent 40%),
      linear-gradient(135deg, #0a0612 0%, #15102a 40%, #0a0612 100%);
  }
  video.world-cam {
    position: fixed; inset: 0; z-index: 1;
    width: 100vw; height: 100vh; object-fit: cover;
    display: none; filter: brightness(0.6) saturate(0.85);
  }
  video.world-cam.on { display: block; }
  body.cam-on .world-gradient { opacity: 0.5; }

  /* Top HUD */
  .hud-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 18px;
    background: rgba(10,6,18,0.7); backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(109,255,126,0.3);
    font-size: 11px; letter-spacing: 0.16em;
  }
  .hud-top .label { color: var(--ink-dim); }
  .hud-top .num { color: var(--cyan); font-variant-numeric: tabular-nums; font-size: 16px; margin-left: 4px; }
  .hud-top .lives { margin-left: auto; }
  .hud-top .heart { color: var(--blood); font-size: 16px; margin: 0 2px; text-shadow: 0 0 8px var(--blood); }
  .hud-top .heart.lost { color: rgba(255,48,64,0.15); text-shadow: none; }

  /* Wave banner */
  .wave-banner {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: var(--gold); font-size: 56px; letter-spacing: 0.3em;
    text-shadow: 0 0 30px rgba(255,209,102,0.7);
    z-index: 12; pointer-events: none;
    animation: waveBanner 2s ease-out forwards;
  }
  @keyframes waveBanner {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
  }

  /* Reticle */
  .reticle {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 70px; height: 70px; z-index: 4; pointer-events: none;
  }
  .reticle .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid var(--cyan); opacity: 0.7;
    box-shadow: 0 0 12px rgba(92,246,255,0.5), inset 0 0 8px rgba(92,246,255,0.15);
    animation: reticlePulse 2s ease-in-out infinite;
  }
  .reticle .dot {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 6px; height: 6px; background: var(--blood); border-radius: 50%;
    box-shadow: 0 0 10px var(--blood);
  }
  .reticle .cross {
    position: absolute; inset: 0;
  }
  .reticle .cross::before, .reticle .cross::after {
    content: ""; position: absolute; background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
  }
  .reticle .cross::before { left: 50%; top: 14px; bottom: 14px; width: 1.5px; transform: translateX(-50%); }
  .reticle .cross::after  { top: 50%; left: 14px; right: 14px; height: 1.5px; transform: translateY(-50%); }
  @keyframes reticlePulse {
    0%,100% { opacity: 0.6; transform: scale(1); }
    50%     { opacity: 1; transform: scale(1.08); }
  }
  .reticle.firing .ring { border-color: var(--blood); box-shadow: 0 0 20px var(--blood); }

  /* FIRE button */
  .fire-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 8;
    width: 92px; height: 92px; border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, rgba(255,48,64,0.4), rgba(10,6,18,0.85));
    border: 2px solid var(--blood);
    color: var(--blood); font-family: inherit; font-size: 13px; letter-spacing: 0.3em; font-weight: 700;
    box-shadow: 0 0 22px rgba(255,48,64,0.55), inset 0 0 22px rgba(255,48,64,0.2);
    touch-action: manipulation;
  }
  .fire-btn:active { transform: scale(0.92); }

  /* Damage vignette */
  .damage-flash { position: fixed; inset: 0; pointer-events: none; z-index: 6;
    box-shadow: inset 0 0 120px 30px rgba(255,48,64,0); transition: box-shadow 0.2s; }
  .damage-flash.active { box-shadow: inset 0 0 200px 50px rgba(255,48,64,0.85); }

  /* Zombies */
  #zombies { position: fixed; inset: 0; z-index: 3; pointer-events: none; }
  .zombie {
    position: absolute; width: 90px; height: 110px;
    pointer-events: auto; cursor: crosshair;
    transition: transform 1.5s linear;
    will-change: transform, left, top;
    animation: zombieSpawn 0.5s ease-out, zombieIdle 1.4s ease-in-out infinite;
  }
  .zombie svg { width: 100%; height: 100%;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7)) drop-shadow(0 0 6px rgba(109,255,126,0.4)); }
  .zombie.dying {
    animation: zombieDie 0.6s ease-out forwards !important;
    pointer-events: none;
  }
  .zombie.fast { animation-duration: 0.5s, 0.7s; }

  @keyframes zombieSpawn {
    0%   { opacity: 0; transform: scale(0.4) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes zombieIdle {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%     { transform: translateY(-8px) rotate(2deg); }
  }
  @keyframes zombieDie {
    0%   { opacity: 1; transform: scale(1); filter: brightness(1); }
    25%  { opacity: 1; transform: scale(1.3); filter: brightness(2.5) hue-rotate(40deg); }
    100% { opacity: 0; transform: scale(0.6) translateY(40px) rotate(20deg); filter: brightness(0.3); }
  }

  /* Hit-points popup */
  .hit-pop {
    position: fixed; pointer-events: none; z-index: 9;
    color: var(--gold); font-size: 18px; font-weight: 700;
    text-shadow: 0 0 10px var(--gold), 0 2px 4px #000;
    animation: hitPop 0.9s ease-out forwards;
  }
  @keyframes hitPop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    25%  { opacity: 1; transform: translate(-50%, -100%) scale(1.2); }
    100% { opacity: 0; transform: translate(-50%, -200%) scale(1); }
  }

  /* Muzzle burst */
  .muzzle-burst {
    position: fixed; pointer-events: none; z-index: 7;
    width: 100px; height: 100px; transform: translate(-50%, -50%);
  }
  .muzzle-burst .ray {
    position: absolute; top: 50%; left: 50%; width: 4px; height: 50px;
    background: linear-gradient(to top, var(--blood), transparent);
    transform-origin: bottom center;
    box-shadow: 0 0 10px var(--blood);
    animation: muzzleRay 0.45s ease-out forwards;
  }
  @keyframes muzzleRay {
    0%   { transform: translate(-50%, -100%) rotate(var(--a)) scaleY(0.3); opacity: 1; }
    100% { transform: translate(-50%, -180%) rotate(var(--a)) scaleY(1); opacity: 0; }
  }

  /* Overlay panels (start, game-over) */
  .overlay { position: fixed; inset: 0; background: rgba(10,6,18,0.85);
    backdrop-filter: blur(10px); z-index: 20;
    display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; padding: 30px; }
  .card { border: 1px solid var(--rot); padding: 26px 30px; min-width: 300px;
    max-width: 420px; background: rgba(31,24,56,0.85); box-shadow: 0 0 28px rgba(109,255,126,0.25); border-radius: 4px; }
  .card h1 { color: var(--rot); margin: 0 0 18px; letter-spacing: 0.2em;
    font-size: 22px; text-align: center; text-shadow: 0 0 12px rgba(109,255,126,0.5); }
  .card p { color: var(--ink-dim); font-size: 12px; line-height: 1.5; text-align: center; }
  .card button { width: 100%; background: transparent; border: 1px solid var(--rot);
    color: var(--rot); padding: 14px; font-family: inherit; font-size: 13px;
    letter-spacing: 0.22em; text-transform: uppercase; cursor: pointer; border-radius: 3px;
    margin-top: 12px; touch-action: manipulation;
    box-shadow: 0 0 14px rgba(109,255,126,0.25); }
  .card button:active { background: rgba(109,255,126,0.15); }
  .card button.danger { color: var(--blood); border-color: var(--blood); box-shadow: 0 0 14px rgba(255,48,64,0.25); }
  .card button.ghost  { color: var(--ink-dim); border-color: var(--ink-dim); box-shadow: none; }
  .stat-line { display: flex; justify-content: space-between; padding: 6px 0;
    border-bottom: 1px solid rgba(109,255,126,0.15); font-size: 13px; }
  .stat-line .v { color: var(--gold); font-variant-numeric: tabular-nums; }

  .back-link {
    position: fixed; top: 8px; left: 8px; z-index: 25;
    font-size: 9px; letter-spacing: 0.2em; color: var(--ink-dim);
    text-decoration: none; padding: 4px 10px; background: rgba(0,0,0,0.5);
    border: 1px solid rgba(139,134,179,0.3); border-radius: 3px;
  }
</style>
</head>
<body>

<div class="world-gradient"></div>
<video id="camera" class="world-cam" autoplay playsinline muted></video>

<!-- Start screen -->
<div class="overlay" id="start-overlay">
  <div class="card">
    <img src="icon.svg" alt="" style="display:block;margin:-6px auto 8px;width:120px;height:120px;filter:drop-shadow(0 0 24px rgba(109,255,126,0.5));"/>
    <h1>ZOMBIES</h1>
    <p>Solo arcade. Zombies spawn at the edges and crawl toward the center. Tap them OR keep the reticle on one and press FIRE. Three lives. Survive as many waves as you can.</p>
    <button id="enable-cam-btn">📷  ENABLE CAMERA</button>
    <button id="start-btn" disabled>BEGIN HUNT</button>
    <a class="back-link" style="position:relative;top:auto;left:auto;display:block;text-align:center;margin-top:12px;color:var(--ink-dim);" href="./">← back to multiplayer</a>
  </div>
</div>

<!-- Game over -->
<div class="overlay" id="end-overlay" style="display:none;">
  <div class="card">
    <h1 id="end-title">YOU DIED</h1>
    <div class="stat-line"><span>Final score</span><span class="v" id="end-score">0</span></div>
    <div class="stat-line"><span>Wave reached</span><span class="v" id="end-wave">1</span></div>
    <div class="stat-line"><span>Best ever</span><span class="v" id="end-best">0</span></div>
    <button id="restart-btn">PLAY AGAIN</button>
    <a class="back-link" style="position:relative;top:auto;left:auto;display:block;text-align:center;margin-top:6px;color:var(--ink-dim);" href="./">← back to multiplayer</a>
  </div>
</div>

<!-- HUD -->
<div class="hud-top" id="hud" style="display:none;">
  <span><span class="label">SCORE</span><span class="num" id="hud-score">0</span></span>
  <span><span class="label">WAVE</span><span class="num" id="hud-wave">1</span></span>
  <span class="lives" id="hud-lives"></span>
</div>

<div id="zombies"></div>

<div class="reticle" id="reticle" style="display:none;">
  <div class="ring"></div><div class="cross"></div><div class="dot"></div>
</div>

<div class="damage-flash" id="damage-flash"></div>

<button id="fire-btn" class="fire-btn" style="display:none;">FIRE</button>

<a class="back-link" href="./">← LOBBY</a>

<!-- Zombie SVG template (injected per zombie) -->
<svg id="zombie-svg-template" style="display:none;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110">
  <defs>
    <radialGradient id="zEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#6dff7e"/>
      <stop offset="100%" stop-color="#6dff7e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zHood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4a3f"/>
      <stop offset="100%" stop-color="#1a2218"/>
    </linearGradient>
  </defs>
  <!-- Tattered hood/body -->
  <path d="M 25 30
           Q 15 20, 30 12
           Q 45 4, 60 12
           Q 75 20, 65 32
           L 70 70
           Q 75 95, 60 100
           Q 45 105, 30 100
           Q 15 95, 20 70 Z"
        fill="url(#zHood)" stroke="#0a140a" stroke-width="2" stroke-linejoin="round"/>
  <!-- Tattered bottom -->
  <path d="M 30 100 L 35 108 L 40 100 L 45 110 L 50 100 L 55 108 L 60 100"
        fill="none" stroke="#0a140a" stroke-width="2"/>
  <!-- Inner face shadow -->
  <ellipse cx="45" cy="35" rx="20" ry="18" fill="#040804"/>
  <!-- Two glowing eyes -->
  <circle cx="36" cy="33" r="9" fill="url(#zEye)"/>
  <circle cx="36" cy="33" r="3" fill="#ffffff"/>
  <circle cx="54" cy="33" r="9" fill="url(#zEye)"/>
  <circle cx="54" cy="33" r="3" fill="#ffffff"/>
  <!-- Snarl mouth -->
  <path d="M 36 50 L 39 52 L 42 50 L 45 53 L 48 50 L 51 52 L 54 50" stroke="#0a140a" stroke-width="2" fill="none"/>
</svg>

<script>
// ═══════════════════════════════════════════════════════════
//  GhostPaint Zombies · single-player arcade
// ═══════════════════════════════════════════════════════════

let cameraOn = false;
let game = null;
let bestScore = Number(localStorage.getItem('gp-zombies-best') || 0);

const $ = (id) => document.getElementById(id);

// ─── camera ────────────────────────────────────────────────
$('enable-cam-btn').addEventListener('click', enableCamera);
async function enableCamera() {
  if (cameraOn) return;
  if (!navigator.mediaDevices?.getUserMedia) {
    alert('No camera access in this browser.');
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
      audio: false,
    });
    const vid = $('camera');
    vid.srcObject = stream;
    await vid.play();
    vid.classList.add('on');
    cameraOn = true;
    document.body.classList.add('cam-on');
    $('enable-cam-btn').textContent = '✓ CAMERA ON';
    $('enable-cam-btn').disabled = true;
    $('enable-cam-btn').style.color = 'var(--rot)';
    $('start-btn').disabled = false;
  } catch (e) {
    alert('Camera denied. Settings → Safari → Camera → Allow, then reload.');
  }
}

$('start-btn').addEventListener('click', startGame);
$('restart-btn').addEventListener('click', () => { $('end-overlay').style.display = 'none'; startGame(); });

// ─── game ──────────────────────────────────────────────────
function startGame() {
  $('start-overlay').style.display = 'none';
  $('end-overlay').style.display = 'none';
  $('hud').style.display = 'flex';
  $('reticle').style.display = 'block';
  $('fire-btn').style.display = 'block';
  document.getElementById('zombies').innerHTML = '';

  game = {
    score: 0, wave: 0, lives: 3,
    zombies: new Map(),         // id → element + state
    nextZombieId: 1,
    spawnTimer: null,
    waveTimer: null,
    moveTimer: null,
    over: false,
    waveStartedAt: 0,
    killsThisWave: 0,
  };
  renderHud();
  beginNextWave();
  game.moveTimer = setInterval(tickPositions, 50);   // 20Hz movement update
}

function beginNextWave() {
  if (!game || game.over) return;
  game.wave++;
  game.killsThisWave = 0;
  game.waveStartedAt = Date.now();
  showWaveBanner('WAVE ' + game.wave);
  renderHud();

  // Difficulty curve
  const spawnIntervalMs = Math.max(700, 4000 - game.wave * 350);
  const travelMs = Math.max(4500, 13000 - game.wave * 700);

  clearInterval(game.spawnTimer);
  game.spawnTimer = setInterval(() => spawnZombie(travelMs), spawnIntervalMs);

  // Wave length: 25-35 sec, then advance
  clearTimeout(game.waveTimer);
  game.waveTimer = setTimeout(beginNextWave, 28000);
}

function spawnZombie(travelMs) {
  if (!game || game.over) return;
  const id = game.nextZombieId++;
  // Pick edge spawn position
  const edges = ['top', 'right', 'bottom', 'left'];
  const edge = edges[Math.floor(Math.random() * 4)];
  let sx, sy;
  if (edge === 'top')    { sx = Math.random() * window.innerWidth; sy = -120; }
  if (edge === 'right')  { sx = window.innerWidth + 120; sy = Math.random() * window.innerHeight; }
  if (edge === 'bottom') { sx = Math.random() * window.innerWidth; sy = window.innerHeight + 120; }
  if (edge === 'left')   { sx = -120; sy = Math.random() * window.innerHeight; }
  const tx = window.innerWidth / 2 + (Math.random() - 0.5) * 100;
  const ty = window.innerHeight / 2 + (Math.random() - 0.5) * 100;

  const tpl = $('zombie-svg-template');
  const el = document.createElement('div');
  el.className = 'zombie';
  if (game.wave > 3) el.classList.add('fast');
  el.style.left = sx + 'px';
  el.style.top  = sy + 'px';
  el.dataset.id = id;
  el.innerHTML = tpl.outerHTML.replace(/style="display:none;"/, '').replace(/id="zombie-svg-template"/, '');
  el.addEventListener('click', () => killZombie(id, true));
  document.getElementById('zombies').appendChild(el);

  game.zombies.set(id, {
    el,
    sx, sy, tx, ty,
    spawnTime: Date.now(),
    travelMs,
    dying: false,
  });
}

function tickPositions() {
  if (!game || game.over) return;
  const now = Date.now();
  for (const [id, z] of game.zombies) {
    if (z.dying) continue;
    const t = Math.min(1, (now - z.spawnTime) / z.travelMs);
    const cx = z.sx + (z.tx - z.sx) * t;
    const cy = z.sy + (z.ty - z.sy) * t;
    z.el.style.left = (cx - 45) + 'px';   // -45 = half width
    z.el.style.top  = (cy - 55) + 'px';   // -55 = half height
    z.cx = cx; z.cy = cy;
    if (t >= 1) {
      // reached center → player loses a life
      onZombieReach(id);
    }
  }
}

function killZombie(id, byTap) {
  const z = game?.zombies.get(id);
  if (!z || z.dying) return;
  z.dying = true;
  z.el.classList.add('dying');
  // Burst at zombie position
  const r = z.el.getBoundingClientRect();
  muzzleBurst(r.left + r.width/2, r.top + r.height/2);
  showHitPop(r.left + r.width/2, r.top + r.height/2, byTap ? '+10' : '+15');
  game.score += byTap ? 10 : 15;
  game.killsThisWave++;
  renderHud();
  haptic(40);
  setTimeout(() => { z.el.remove(); game.zombies.delete(id); }, 600);

  // Bonus wave advance if wave clears fast
  if (game.killsThisWave >= 12 + game.wave * 2) {
    clearTimeout(game.waveTimer);
    game.waveTimer = setTimeout(beginNextWave, 1500);
  }
}

function onZombieReach(id) {
  const z = game?.zombies.get(id);
  if (!z || z.dying) return;
  z.el.remove();
  game.zombies.delete(id);
  game.lives--;
  flashDamage();
  haptic([60, 40, 60]);
  renderHud();
  if (game.lives <= 0) endGame();
}

function endGame() {
  game.over = true;
  clearInterval(game.spawnTimer);
  clearInterval(game.moveTimer);
  clearTimeout(game.waveTimer);
  // Clear remaining zombies dramatically
  for (const [, z] of game.zombies) z.el.classList.add('dying');
  setTimeout(() => document.getElementById('zombies').innerHTML = '', 700);

  if (game.score > bestScore) {
    bestScore = game.score;
    localStorage.setItem('gp-zombies-best', String(bestScore));
  }
  $('end-score').textContent = game.score;
  $('end-wave').textContent  = game.wave;
  $('end-best').textContent  = bestScore;
  $('hud').style.display = 'none';
  $('reticle').style.display = 'none';
  $('fire-btn').style.display = 'none';
  $('end-overlay').style.display = 'flex';
}

// ─── HUD ────────────────────────────────────────────────────
function renderHud() {
  if (!game) return;
  $('hud-score').textContent = game.score;
  $('hud-wave').textContent  = game.wave;
  const lives = $('hud-lives');
  lives.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i < game.lives ? '' : ' lost');
    h.textContent = '❤';
    lives.appendChild(h);
  }
}

function showWaveBanner(text) {
  const b = document.createElement('div');
  b.className = 'wave-banner';
  b.textContent = text;
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 2100);
}

// ─── FIRE button = kill zombie closest to reticle ──────────
$('fire-btn').addEventListener('click', () => {
  if (!game || game.over) return;
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  let nearest = null, nearestDist = Infinity;
  for (const [id, z] of game.zombies) {
    if (z.dying) continue;
    const dx = z.cx - cx, dy = z.cy - cy;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 140 && d < nearestDist) {  // 140px radius around reticle
      nearestDist = d; nearest = id;
    }
  }
  $('reticle').classList.add('firing');
  setTimeout(() => $('reticle').classList.remove('firing'), 200);
  if (nearest != null) {
    killZombie(nearest, false);
  } else {
    muzzleBurst(cx, cy);
    haptic(20);
  }
});

// ─── effects ───────────────────────────────────────────────
function muzzleBurst(x, y) {
  const burst = document.createElement('div');
  burst.className = 'muzzle-burst';
  burst.style.left = x + 'px';
  burst.style.top  = y + 'px';
  for (let i = 0; i < 8; i++) {
    const ray = document.createElement('div');
    ray.className = 'ray';
    ray.style.setProperty('--a', (i * 45) + 'deg');
    burst.appendChild(ray);
  }
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 500);
}

function showHitPop(x, y, text) {
  const p = document.createElement('div');
  p.className = 'hit-pop';
  p.textContent = text;
  p.style.left = x + 'px';
  p.style.top  = y + 'px';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 1000);
}

function flashDamage() {
  const f = $('damage-flash');
  f.classList.add('active');
  setTimeout(() => f.classList.remove('active'), 250);
}

function haptic(p) { if (navigator.vibrate) navigator.vibrate(p); }
</script>
</body>
</html>
