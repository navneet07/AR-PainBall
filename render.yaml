# Render Blueprint for GhostPaint
# Deploy by pointing Render's "New Blueprint" at this repo.

services:
  - type: web
    name: ghostpaint
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
