name: GhostPaint
options:
  bundleIdPrefix: com.nitin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""                      # set yours in Xcode after first open
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Recommended-settings pass (modern toolchain defaults · 2026)
    CLANG_ANALYZER_NONNULL: YES
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_NO_COMMON_BLOCKS: YES
    MTL_FAST_MATH: YES
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  GhostPaint:
    type: application
    platform: iOS
    sources:
      - path: GhostPaint
        excludes:
          - "**/*.md"
    info:
      path: GhostPaint/Info.plist
      properties:
        CFBundleDisplayName: GhostPaint
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "GhostPaint uses the camera to detect player bibs during matches."
        NSLocalNetworkUsageDescription: "GhostPaint connects to a local Mac game server on your WiFi or hotspot."
        NSAppTransportSecurity:
          # NSAllowsLocalNetworking silently overrides NSAllowsArbitraryLoads
          # (Apple gotcha). Using arbitrary-loads alone so it ALSO covers
          # USB-tether IPs like 192.0.0.2 which aren't in RFC1918 space.
          NSAllowsArbitraryLoads: true
        NSBonjourServices:
          - _ghostpaint._tcp
          - _ghostpaint._tcp.
        NSMotionUsageDescription: "Compass bearing uses device motion."
        NSLocationWhenInUseUsageDescription: "Optional minimap uses GPS when outdoors."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nitin.ghostpaint
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIRequiresPersistentWiFi: YES
    dependencies:
      - sdk: ARKit.framework
      - sdk: Vision.framework
      - sdk: CoreMotion.framework
      - sdk: CoreLocation.framework
      - sdk: AVFoundation.framework
      - sdk: Network.framework
      - sdk: QuartzCore.framework
